<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    @font-face {
      font-family: 'Geist';
      src: url('../renderer/public/fonts/Geist-Variable.woff2') format('woff2-variations');
      font-weight: 100 900;
      font-style: normal;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -webkit-app-region: drag;
    }
    html, body {
      width: 100%;
      height: 100%;
      background: #09090b;
      overflow: hidden;
    }
    .wrap {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding-bottom: 40px;
    }
    .logo {
      width: 64px;
      height: 64px;
      opacity: 0.95;
    }
    .splash-loading-path {
      stroke: #FFFFFF;
      stroke-width: 20;
      fill: none;
      stroke-dasharray: 5000;
      stroke-dashoffset: 5000;
      stroke-linecap: round;
      stroke-linejoin: round;
      animation: splashDrawLines 1.4s cubic-bezier(0.35, 0, 0.25, 1) infinite;
    }
    .text-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .app-name {
      font-family: 'Geist', 'Segoe UI', system-ui, sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #3f3f46;
    }
    .status {
      font-family: 'Geist', 'Segoe UI', system-ui, sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: #52525b;
      min-height: 14px;
      transition: opacity 0.2s;
    }
    .version {
      font-family: 'Geist', 'Segoe UI', system-ui, sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: #71717a;
      min-height: 14px;
    }
    .bar-track {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: rgba(255,255,255,0.04);
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 40%;
      background: #3f3f46;
      border-radius: 1px;
      animation: slide 1.8s ease-in-out infinite;
      transition: width 0.25s ease, background 0.2s ease;
    }
    @keyframes slide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
    @keyframes splashDrawLines {
      0% { stroke-dashoffset: 5000; fill: rgba(255, 255, 255, 0); }
      55% { stroke-dashoffset: 0; fill: rgba(255, 255, 255, 0); }
      72% { stroke-dashoffset: 0; fill: rgba(255, 255, 255, 1); }
      90% { stroke-dashoffset: -5000; fill: rgba(255, 255, 255, 0); }
      100% { stroke-dashoffset: -5000; fill: rgba(255, 255, 255, 0); }
    }
  </style>
</head>

      <span class="app-name">UnionCrax.Direct</span>

    </div>
  </div>
  <div class="bar-track"><div class="bar-fill"></div></div>
  <script>
    (function () {
      var versionEl = document.getElementById('version')
      if (!versionEl) return
      var version = new URLSearchParams(window.location.search).get('v')
      if (version) versionEl.textContent = 'v' + version
    })()
  </script>
