<svg version="1.0" xmlns="http://www.w3.org/2000/svg"
 width="500pt" height="500pt" viewBox="0 0 1254.000000 1254.000000"
 preserveAspectRatio="xMidYMid meet">
  <style>
    .loading-path {
      stroke: #000000;
      stroke-width: 20; /* Adjust thickness for premium feel */
      fill: none;
      stroke-dasharray: 5000;
      stroke-dashoffset: 5000;
      stroke-linecap: round;
      stroke-linejoin: round;
      animation: drawLines 3s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
    }

    @keyframes drawLines {
      0% {
        stroke-dashoffset: 5000;
      }
      40% {
        stroke-dashoffset: 0;
        fill: rgba(0,0,0,0);
      }
      60% {
        stroke-dashoffset: 0;
        fill: rgba(0,0,0,1); /* Fills in briefly at the peak */
      }
      100% {
        stroke-dashoffset: -5000;
        fill: rgba(0,0,0,0);
      }
    }
  </style>

