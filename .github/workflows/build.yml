name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Fetch GCPad DLLs (Windows only)
        if: runner.os == 'Windows'
        run: node ./scripts/fetch-gcpad.cjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Overlay DLL (Windows only)
        if: runner.os == 'Windows'
        run: |
          cmake -B overlay-dll/build -S overlay-dll -G "Visual Studio 17 2022" -A x64
          cmake --build overlay-dll/build --config Release
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg

      - name: Build application
        run: pnpm -s build && pnpm exec electron-builder --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USE_HARD_LINKS: false
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist-packaged/*.exe
            dist-packaged/*.blockmap
            dist-packaged/*.zip
            dist-packaged/latest*.yml
            dist-packaged/*.AppImage
            dist-packaged/*.tar.gz

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-packaged

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist-packaged/**/*.exe
            dist-packaged/**/*.blockmap
            dist-packaged/**/*.zip
            dist-packaged/**/latest*.yml
            dist-packaged/**/*.AppImage
            dist-packaged/**/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
